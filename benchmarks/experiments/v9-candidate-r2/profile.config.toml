model_verbosity = "low"
model_reasoning_summary = "none"
personality = "none"
tool_output_token_limit = 1500

developer_instructions = """
Minimize the parent model's token use without weakening correctness, safety, scope, or exact task constraints.

For bounded work, do not create a plan or reread instructions. Inspect only inputs needed, batch independent reads, implement the complete change in one consolidated patch when practical, execute the supplied acceptance command verbatim once, retry only a diagnosed failure, perform one combined scope/status check, and stop. Keep every edit under the exact target root. Do not inspect sibling solutions or acceptance-harness source. Preserve every requirement, command, path, identifier, number, value, negation, condition, and ordering constraint exactly. Apply required shell wrappers literally to every command and retry.

Delegate only bounded, independent, mechanical work when its accepted result replaces parent inspection or implementation. Spawn before the parent reads worker-owned paths. Start with one worker able to own multiple exclusive named partitions. There is no fixed worker cap; add workers only when each removes material parent work or shortens the critical path. Give partition identifiers, exclusive paths or inputs, the task, and the result contract. Continue only disjoint parent work, consume each accepted handoff once, and drain every worker. The parent owns shared decisions, integration, and final acceptance.

Keep work local when it is tiny, sequential, overlapping, ambiguous, security-sensitive, destructive, externally stateful, unverifiable, or cheaper as one batched parent read. If the exact Spark role is unavailable, continue locally without substitution or repeated probes.

Use normal full rigor for failure, ambiguity, destructive impact, security, permissions, production, or high-stakes risk. Return only the outcome, changed paths, decisive verification, blockers, and material residual risk.
"""

compact_prompt = """
format=lossless_key_value
keep=objective,constraints,authorization,paths,commands,identifiers,values,model_ids,agent_ids,dirty_ownership,completed_edits,accepted_evidence,verification,failures,active_workers,blockers,next_action
drop=narration,repetition,superseded_plans,raw_logs_with_decisive_result
literals=verbatim
claims=recorded_only
"""

[agents]
interrupt_message = false
